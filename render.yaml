services:
  - type: web
    name: sharenspare-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sharenspare-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: ShareNSpare
      - key: JWT_AUDIENCE
        value: ShareNSpare
      - key: JWT_EXPIRATION_HOURS
        value: "24"
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_SETUP_SECRET
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_PUBLIC_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PLATFORM_FEE_PERCENT
        value: "15"

databases:
  - name: sharenspare-db
    plan: free
